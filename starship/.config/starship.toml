"$schema" = 'https://starship.rs/config-schema.json'

palette = "bar_colors"

format = """
$hostname\
$username\
$nix_shell\

[Ņé░](bg:bar2 fg:bar1)\
$directory\
${custom.dir_stack}\

${custom.fix_arrow}\

$git_branch\
$git_status\

$time\
$jobs\
[Ņé░ ](fg:bar4)\
$line_break\
$character"""

[custom.fix_arrow]
when = "test ! -d .git && ! git rev-parse --is-inside-work-tree > /dev/null 2>&1"
command = "echo Ņé░"
style = "fg:bar2 bg:bar4"
format = "[$output]($style)"

[custom.dir_stack]
when = "test ! $(cat $SESSION_DIR/$STARSHIP_SESSION) = '1'"
command = "echo ’ö× "
style = "bg:bar2 fg:black"
format = "[$output  ]($style)"

[hostname]
ssh_symbol = "¾░ó╣ "
style = "bg:bar1 fg:black"
format = "[ $ssh_symbol]($style)"

[username]
show_always = true
style_user = "bg:bar1 fg:black"
style_root = "bg:bar1 fg:red"
format = '[ $user ]($style)'

[nix_shell]
symbol = "¾▒äģ "
style = "bg:bar1 fg:black"
format = "[$symbol]($style)"

[directory]
style = "bg:bar2 fg:black"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś "
style = "fg:black bg:bar3"
format = '[Ņé░](fg:bar2 bg:bar3)[ $symbol $branch ]($style)'

[git_status]
style = "fg:black bg:bar3"
format = '[($all_status$ahead_behind )]($style)[Ņé░](fg:bar3 bg:bar4)'
ahead = " ¾░ü× ${count}"
behind = " ¾░üå ${count}"
modified = "’ä¬"
diverged = " ¾░ü× ${ahead_count} ¾░üå ${behind_count}"

[time]
disabled = false
time_format = "%l:%M"
style = "fg:black bg:bar4"
format = '[$time ]($style)'

[jobs]
symbol = "Ņś½ "
style = "fg:black bg:bar4"
format = "[$symbol$number]($style)"

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'

[palettes.bar_colors]
bar1 = "green"
bar2 = "purple"
bar3 = "yellow"
bar4 = "blue"
